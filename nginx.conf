# Nginx config for AI Trading Bot
# Place at: /etc/nginx/sites-available/tradebot
# Then: sudo ln -s /etc/nginx/sites-available/tradebot /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # Redirect all HTTP → HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # WebSocket headers (required for Socket.IO)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — bot scans can be slow
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time events
        proxy_buffering off;
    }

    # Static files served directly by nginx (faster)
    location /static/ {
        alias /var/www/tradebot/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

